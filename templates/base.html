{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCM | {% block title %}{% endblock %}</title>
    <link rel="shortcut icon" href="{% static 'image/shorticon-3.png' %}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/base/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a href="{% url 'home' %}">
                <img src="{% static 'image/logo_4.png' %}" class="logo_1">
            </a>
            <form class="d-flex" role="search" action="{% url 'home' %}" method="GET">
                <div class="search-box">

                    <input class="form-control input-busqueda" type="search" name="q" placeholder="Buscar..."
                        aria-label="Search" value="{{ request.GET.q }}">

                    <button class="btn-lupa" type="submit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-search" viewBox="0 0 16 16">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                        </svg>
                    </button>

                </div>
            </form>
            <div class="icons-container">
                <a href="/login/" class="me-3"> <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                        class="bi bi-person-circle icon-usuario" viewBox="0 0 16 16">
                        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                        <path fill-rule="evenodd"
                            d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                    </svg>
                </a>

                <a href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-bag-fill icon-carrito"
                        viewBox="0 0 16 16">
                        <path
                            d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4z" />
                    </svg>
                </a>
            </div>
        </div>
    </nav>
    <div class="category-bar">
        <div class="container d-flex justify-content-center flex-wrap">

            <a href="{% url 'home' %}?categoria=Calzado"
                class="cat-link {% if request.GET.categoria == 'Calzado' %}active{% endif %}">
                Calzado
            </a>

            <a href="{% url 'home' %}?categoria=Indumentaria"
                class="cat-link {% if request.GET.categoria == 'Indumentaria' %}active{% endif %}">
                Indumentaria
            </a>

            <a href="{% url 'home' %}?categoria=Canilleras"
                class="cat-link {% if request.GET.categoria == 'Canilleras' %}active{% endif %}">
                Canilleras
            </a>

            <a href="{% url 'home' %}?categoria=Balones"
                class="cat-link {% if request.GET.categoria == 'Balones' %}active{% endif %}">
                Balones
            </a>

            <a href="{% url 'home' %}?categoria=Accesorios"
                class="cat-link {% if request.GET.categoria == 'Accesorios' %}active{% endif %}">
                Accesorios
            </a>

        </div>
    </div>
    {% block content %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
